<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmÖneri - Keşfetmeye Başla</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div> 
    
    <nav class="navbar">
        <div class="nav-links">
            <a href="#" class="active">Ana Sayfa</a>
            <a href="#">Arama</a>
            <a href="#">Film Listeleri</a>
            <a href="#">AI Önerileri</a>
        </div>
        <div class="nav-auth">
            <button class="dark-mode-btn">Koyu Tema</button>
        </div>
    </nav>

    <main class="hero">
        <div class="logo-area">
            <span class="sparkle">✨</span>
            <h1 class="logo-text">FilmÖneri</h1>
            <span class="sparkle">✨</span>
        </div>
        
        <p class="subtitle">
            Türkiye'nin en kapsamlı film öneri platformu. Tür ve platform seçerek <br>
            <span>kişiselleştirilmiş film önerileri</span> alın.
        </p>

        <div class="main-actions">
            <button class="btn-primary">✨ Film Önerileri</button>
            <button class="btn-secondary">🔍 Platform Araması</button>
        </div>

        <div class="filter-box">
            <select id="genre-select">
                <option value="">Tür seçiniz</option>
                <option value="27">Korku</option>
                <option value="53">Gerilim</option>
                <option value="28">Aksiyon</option>
            </select>
            
            <select id="platform-select">
                <option value="">Platform seçiniz</option>
                <option value="netflix">Netflix</option>
                <option value="disney">Disney+</option>
            </select>

            <button id="suggest-btn" class="btn-suggest">Film öner</button>
        </div>

        <div class="api-note">
            <p>Film verileri <strong>The Movie Database (TMDb)</strong> API'si kullanılarak sağlanmaktadır.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
