<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popcorn Time | Film Öner</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div> 
    
    <div class="container">
        <h1 class="main-title">FİLM ÖNER</h1>
        
        <div class="genre-container">
            <button class="genre-btn active" data-genre="all">Hepsi</button>
            <button class="genre-btn" data-genre="53">Gerilim</button>
            <button class="genre-btn" data-genre="27">Korku</button>
            <button class="genre-btn" data-genre="28">Aksiyon</button>
        </div>

        <div id="movie-card" class="card">
            <div class="poster-wrapper">
                <img id="poster" src="https://via.placeholder.com/200x300?text=Film+Bekleniyor" alt="Film Afişi">
            </div>
            <div class="info">
                <h2 id="title">Hangi Filmi İzlesek?</h2>
                <p id="overview">Türünü seç ve butona bas, senin için en iyi filmi bulalım.</p>
                <div id="rating-badge"></div>
            </div>
        </div>

        <button id="suggest-btn">BANA ÖNERİ YAP!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
